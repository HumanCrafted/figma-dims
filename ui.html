<meta charset="utf-8">
<style>
  :root { color-scheme: light dark; }
  body {
    font: 11px/1.4 Inter, -apple-system, sans-serif;
    margin: 0; padding: 12px;
    color: var(--figma-color-text, #1e1e1e);
  }
  /* Non-collapsible section heading (matches the collapsible summaries, minus the caret). */
  .sectitle { margin: 0 0 6px; font-size: 10px; text-transform: uppercase; letter-spacing: .04em; opacity: .6; }

  /* Collapsible section: <details class="sec"> with a <summary> styled like the old h4. */
  .sec { margin: 0; }
  .sec > summary {
    list-style: none; cursor: pointer; user-select: none;
    margin: 12px 0 6px; font-size: 10px; text-transform: uppercase; letter-spacing: .04em; opacity: .6;
    display: flex; align-items: center; gap: 6px;
  }
  .sec > summary::-webkit-details-marker { display: none; }
  .sec > summary::before {
    content: ""; width: 0; height: 0; flex: none;
    border-left: 4px solid currentColor; border-top: 3px solid transparent; border-bottom: 3px solid transparent;
    transition: transform .12s ease;
  }
  .sec[open] > summary::before { transform: rotate(90deg); }

  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 4px; }
  .grid button {
    height: 46px; padding: 5px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid var(--figma-color-border, #d9d9d9);
    border-radius: 6px; background: var(--figma-color-bg, #fff);
    color: inherit;
  }
  .grid button:hover {
    background: var(--figma-color-bg-hover, #f5f5f5);
    border-color: var(--figma-color-border-brand, #0d99ff);
  }
  .grid button:active { background: var(--figma-color-bg-brand-tertiary, #e5f4ff); }
  .grid svg { width: 100%; height: 100%; display: block; }

  .row { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin: 5px 0; }
  .row label { flex: 1; }
  .row input, .row select {
    padding: 3px 6px; border: 1px solid var(--figma-color-border, #d9d9d9);
    border-radius: 4px; background: var(--figma-color-bg, #fff); color: inherit;
  }
  .row input { width: 64px; text-align: right; }
  .row select { width: 120px; text-align: left; }
  /* Scale is a text field (accepts "1/4") so it has no spinner. Reserve the same right
     gutter the number spinners occupy so its value lines up with the other fields. */
  #scale { padding-right: 22px; }

  .seg { display: flex; gap: 4px; margin: 6px 0 8px; }
  .seg button {
    flex: 1; height: 26px; cursor: pointer; font-size: 11px;
    border: 1px solid var(--figma-color-border, #d9d9d9); border-radius: 4px;
    background: var(--figma-color-bg, #fff); color: inherit;
  }
  .seg button.active {
    background: var(--figma-color-bg-brand, #0d99ff); color: #fff; border-color: transparent;
  }
  .check { display: flex; align-items: center; gap: 6px; margin: 6px 0; }
  .full { width: 100%; height: 30px; cursor: pointer; margin-top: 8px;
    border: 1px solid var(--figma-color-border, #d9d9d9); border-radius: 6px;
    background: var(--figma-color-bg, #fff); color: inherit; }
  .full:hover { background: var(--figma-color-bg-hover, #f5f5f5); }
  hr { border: none; border-top: 1px solid var(--figma-color-border, #e6e6e6); margin: 12px 0; }
</style>

<div class="sectitle">Drop a dimension</div>
<div class="grid" id="variants"></div>

<details class="sec">
  <summary>Line &amp; arrows</summary>
  <div class="row"><label>Line weight</label><input type="number" id="thickness" step="0.25" min="0.25"></div>
  <div class="row"><label>Arrow style</label>
    <select id="arrowStyle">
      <option value="ARROW_LINES">Line</option>
      <option value="ARROW_EQUILATERAL">Triangle</option>
      <option value="TRIANGLE_FILLED">Reversed</option>
      <option value="CIRCLE_FILLED">Circle</option>
      <option value="DIAMOND_FILLED">Diamond</option>
    </select>
  </div>
</details>

<details class="sec">
  <summary>Label</summary>
  <div class="row"><label>Font</label><select id="fontFamily"></select></div>
  <div class="row"><label>Font size (px)</label><input type="number" id="fontSize" step="1" min="4"></div>
</details>

<details class="sec">
  <summary>Witness lines</summary>
  <div class="row"><label>Gap from feature (px)</label><input type="number" id="witnessGap" step="1" min="0"></div>
  <div class="row"><label>Overshoot past line (px)</label><input type="number" id="witnessOvershoot" step="1" min="0"></div>
</details>

<details class="sec">
  <summary>Units</summary>
  <div class="row"><label>DPI (Figma = 72)</label><input type="number" id="dpi" step="1" min="1"></div>
  <div class="row"><label>Scale (e.g. 1, 0.25, 1/4)</label><input type="text" id="scale" inputmode="text"></div>
  <div class="seg" id="unit">
    <button data-u="in">in</button>
    <button data-u="ft">ft</button>
    <button data-u="mm">mm</button>
    <button data-u="cm">cm</button>
    <button data-u="m">m</button>
  </div>
  <div class="row"><label>Decimals</label><input type="number" id="decimals" step="1" min="0" max="4"></div>
  <div class="check"><input type="checkbox" id="showUnit"><label for="showUnit">Show unit in label</label></div>
</details>

<hr>
<div class="check"><input type="checkbox" id="live"><label for="live">Live update while open</label></div>
<button class="full" id="recalc">Recalculate all dimensions</button>

<script>
  const ids = ['thickness','arrowStyle','fontFamily','fontSize','witnessGap','witnessOvershoot','dpi','scale','decimals','showUnit','live'];
  const el = (id) => document.getElementById(id);
  let currentUnit = 'in';

  // --- Variant grid: 8 buttons, each drops one (orient × labelStyle × flip) combo. ---
  // Icons drawn as tiny SVGs. Feature/witness side follows the real geometry: standard puts
  // the label opposite the feature; inline centers the label on the line, ticks show the side.
  function icon(orient, inline, flip) {
    const seg = [];
    let rect;
    if (orient === 'H') {
      const ly = 24, x1 = 10, x2 = 50, ty = flip ? 10 : 38; // ticks toward feature
      if (inline) { seg.push(`M${x1} ${ly}H26`, `M34 ${ly}H${x2}`); rect = `x="21" y="20" width="18" height="8"`; }
      else { seg.push(`M${x1} ${ly}H${x2}`); rect = `x="21" y="${flip ? 30 : 10}" width="18" height="8"`; }
      seg.push(`M${x1} ${ly}V${ty}`, `M${x2} ${ly}V${ty}`);
    } else {
      const lx = 30, y1 = 8, y2 = 40, tx = flip ? 42 : 18; // ticks toward feature
      if (inline) { seg.push(`M${lx} ${y1}V20`, `M${lx} 28V${y2}`); rect = `x="22" y="20" width="16" height="8"`; }
      else { seg.push(`M${lx} ${y1}V${y2}`); rect = `x="${flip ? 6 : 38}" y="20" width="16" height="8"`; }
      seg.push(`M${lx} ${y1}H${tx}`, `M${lx} ${y2}H${tx}`);
    }
    return `<svg viewBox="0 0 60 48" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">`
      + `<path d="${seg.join('')}"/><rect ${rect} rx="3" fill="currentColor" stroke="none"/></svg>`;
  }
  // Order matches the Figma reference: row 1 standard, row 2 inline; cols H·V·H(mirror)·V(mirror).
  const VARIANTS = [
    { o: 'H', ls: 'standard', f: false, t: 'Horizontal — label above' },
    { o: 'V', ls: 'standard', f: false, t: 'Vertical — label right' },
    { o: 'H', ls: 'standard', f: true,  t: 'Horizontal — label below' },
    { o: 'V', ls: 'standard', f: true,  t: 'Vertical — label left' },
    { o: 'H', ls: 'inline',   f: false, t: 'Horizontal inline — feature below' },
    { o: 'V', ls: 'inline',   f: false, t: 'Vertical inline — feature left' },
    { o: 'H', ls: 'inline',   f: true,  t: 'Horizontal inline — feature above' },
    { o: 'V', ls: 'inline',   f: true,  t: 'Vertical inline — feature right' },
  ];
  (function buildGrid() {
    const g = el('variants');
    VARIANTS.forEach((v) => {
      const b = document.createElement('button');
      b.type = 'button';
      b.title = v.t;
      b.innerHTML = icon(v.o, v.ls === 'inline', v.f);
      b.onclick = () => parent.postMessage({ pluginMessage: { type: 'create', orient: v.o, labelStyle: v.ls, flip: v.f } }, '*');
      g.appendChild(b);
    });
  })();

  // Accept a plain decimal (0.25), a whole number (1), or a fraction (1/4).
  // Falls back to 1 for empty/invalid input so the label math never divides by 0.
  function parseScale(str) {
    str = String(str == null ? '' : str).trim();
    if (!str) return 1;
    if (str.indexOf('/') >= 0) {
      const parts = str.split('/');
      const a = parseFloat(parts[0]);
      const b = parseFloat(parts[1]);
      return (isFinite(a) && isFinite(b) && b !== 0) ? a / b : 1;
    }
    const n = parseFloat(str);
    return (isFinite(n) && n > 0) ? n : 1;
  }

  function read() {
    return {
      thickness: +el('thickness').value,
      arrowStyle: el('arrowStyle').value,
      fontFamily: el('fontFamily').value,
      fontSize: +el('fontSize').value,
      witnessGap: +el('witnessGap').value,
      witnessOvershoot: +el('witnessOvershoot').value,
      dpi: +el('dpi').value,
      unit: currentUnit,
      scale: parseScale(el('scale').value),
      decimals: +el('decimals').value,
      showUnit: el('showUnit').checked,
      live: el('live').checked,
    };
  }
  function push() { parent.postMessage({ pluginMessage: { type: 'settings', settings: read() } }, '*'); }

  ids.forEach((id) => {
    const node = el(id);
    const evt = (node.type === 'checkbox' || node.tagName === 'SELECT') ? 'change' : 'input';
    node.addEventListener(evt, push);
  });

  function markUnit() {
    document.querySelectorAll('#unit button').forEach((b) => b.classList.toggle('active', b.dataset.u === currentUnit));
  }
  document.querySelectorAll('#unit button').forEach((b) => {
    b.onclick = () => { currentUnit = b.dataset.u; markUnit(); push(); };
  });

  el('recalc').onclick = () => parent.postMessage({ pluginMessage: { type: 'recalc' } }, '*');

  // Resize the plugin window to fit the content, so collapsing sections actually shrinks it.
  // Measure from the last element's layout offset (not body's box, which can stretch to the
  // iframe height and never report the shorter content height).
  function syncHeight() {
    requestAnimationFrame(() => {
      const last = el('recalc');
      const h = Math.ceil(last.offsetTop + last.offsetHeight) + 12; // + body bottom padding
      parent.postMessage({ pluginMessage: { type: 'resize', height: h } }, '*');
    });
  }
  document.querySelectorAll('.sec').forEach((d) => d.addEventListener('toggle', syncHeight));
  syncHeight();

  onmessage = (e) => {
    const msg = e.data.pluginMessage;
    if (msg && msg.type === 'init') {
      const s = msg.settings;
      // populate the font dropdown from available families
      if (Array.isArray(msg.fonts)) {
        const sel = el('fontFamily');
        sel.innerHTML = '';
        msg.fonts.forEach((fam) => {
          const o = document.createElement('option');
          o.value = fam; o.textContent = fam;
          sel.appendChild(o);
        });
        if (s.fontFamily && msg.fonts.indexOf(s.fontFamily) < 0) {
          const o = document.createElement('option');
          o.value = s.fontFamily; o.textContent = s.fontFamily + ' (unavailable)';
          sel.appendChild(o);
        }
      }
      el('thickness').value = s.thickness;
      el('arrowStyle').value = s.arrowStyle;
      el('fontFamily').value = s.fontFamily;
      el('fontSize').value = s.fontSize;
      el('witnessGap').value = s.witnessGap;
      el('witnessOvershoot').value = s.witnessOvershoot;
      el('dpi').value = s.dpi;
      el('scale').value = s.scale != null ? s.scale : 1;
      currentUnit = s.unit || 'in';
      markUnit();
      el('decimals').value = s.decimals;
      el('showUnit').checked = s.showUnit;
      el('live').checked = s.live;
    }
  };
</script>
